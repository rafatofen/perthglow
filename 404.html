<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Perth Glow Furniture Hire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Syncopate:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png">
<meta name="theme-color" content="#050508">
<style>
:root{--black:#050508;--white:#f0eeea;--dim:rgba(240,238,234,.55);--cyan:#b57bee;--purple:#c77dff;--magenta:#e040fb;--display:'Syncopate',sans-serif;--serif:'Cormorant Garamond',serif;--body:'DM Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--black);color:var(--white);font-family:var(--body);font-weight:300;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;position:relative;overflow:hidden}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;animation:drift ease-in-out infinite}
.orb-1{width:700px;height:700px;background:var(--purple);opacity:.18;top:-200px;left:-200px;animation-duration:12s}
.orb-2{width:500px;height:500px;background:var(--magenta);opacity:.12;bottom:-100px;right:-100px;animation-duration:9s;animation-delay:-4s}
.orb-3{width:400px;height:400px;background:#4361ee;opacity:.15;top:40%;left:60%;animation-duration:14s;animation-delay:-7s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.05)}66%{transform:translate(-20px,20px) scale(.97)}}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");pointer-events:none;z-index:9998;opacity:.35;mix-blend-mode:overlay}
.content{position:relative;z-index:2;text-align:center;padding:2rem 5vw;animation:fadeUp .8s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.four-o-four{position:relative;display:inline-block;margin-bottom:1.5rem}
.num{font-family:var(--serif);font-size:clamp(8rem,22vw,18rem);font-weight:300;line-height:1;letter-spacing:-.03em;color:transparent;-webkit-text-stroke:1px rgba(181,123,238,.25);position:relative;user-select:none}
.num::before{content:attr(data-text);position:absolute;inset:0;color:var(--purple);text-shadow:0 0 40px var(--purple),0 0 80px rgba(199,125,255,.4),0 0 120px rgba(199,125,255,.2);-webkit-text-stroke:0;animation:flicker 4s ease-in-out infinite}
.num::after{content:attr(data-text);position:absolute;inset:0;color:var(--magenta);text-shadow:0 0 60px var(--magenta),0 0 100px rgba(224,64,251,.3);-webkit-text-stroke:0;opacity:.3;animation:flicker 4s ease-in-out infinite 2s}
@keyframes flicker{0%,100%{opacity:1}45%{opacity:.9}50%{opacity:.65}55%{opacity:.95}90%{opacity:.85}}
.scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--cyan),transparent);opacity:.8;animation:scan 2.5s ease-in-out infinite;top:0}
@keyframes scan{0%{top:0;opacity:.8}100%{top:100%;opacity:0}}
.eyebrow{font-family:var(--display);font-size:.55rem;letter-spacing:.35em;color:var(--cyan);text-transform:uppercase;margin-bottom:1.2rem}
.title{font-family:var(--serif);font-size:clamp(2rem,5vw,3.5rem);font-weight:300;margin-bottom:.8rem}
.title em{font-style:italic;color:var(--purple)}
.sub{color:var(--dim);font-size:.95rem;line-height:1.7;max-width:440px;margin:0 auto 2.5rem}
.btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn{font-family:var(--display);font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;padding:14px 32px;text-decoration:none;display:inline-block;transition:.3s;cursor:pointer;border:none}
.btn-fill{background:linear-gradient(135deg,var(--purple),var(--cyan));color:var(--black);font-weight:700}
.btn-fill:hover{box-shadow:0 0 32px rgba(181,123,238,.5);transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,.2)}
.btn-ghost:hover{border-color:var(--purple);color:var(--purple)}
.particles{position:fixed;inset:0;pointer-events:none;z-index:1}
.particle{position:absolute;width:2px;height:2px;border-radius:50%;animation:float-up linear infinite}
@keyframes float-up{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(-10vh);opacity:0}}
.logo-link{position:fixed;top:24px;left:5vw;z-index:100;text-decoration:none}
.logo-link img{height:40px;filter:drop-shadow(0 0 12px rgba(181,123,238,.4))}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="particles" id="particles"></div>
<a href="index.html" class="logo-link"><img src="assets/logo-transparent.png" alt="Perth Glow"></a>
<div class="content">
  <p class="eyebrow">Error 404</p>
  <div class="four-o-four">
    <div class="scan"></div>
    <div class="num" data-text="404">404</div>
  </div>
  <h1 class="title">This Page Has <em>Gone Dark</em></h1>
  <p class="sub">Looks like the glow left this page. It doesn't exist — or maybe it never did. Let's get you back somewhere bright.</p>
  <div class="btns">
    <a href="index.html" class="btn btn-fill">Back to Home</a>
    <a href="hire.html" class="btn btn-ghost">Browse Products</a>
  </div>
</div>
<script>
var p=document.getElementById('particles');
var cols=['#b57bee','#c77dff','#e040fb','#4361ee','#ffffff'];
for(var i=0;i<45;i++){
  var el=document.createElement('div');
  el.className='particle';
  el.style.left=Math.random()*100+'vw';
  el.style.width=el.style.height=(Math.random()*3+1)+'px';
  el.style.background=cols[Math.floor(Math.random()*cols.length)];
  el.style.animationDuration=(Math.random()*10+8)+'s';
  el.style.animationDelay=(Math.random()*12)+'s';
  el.style.boxShadow='0 0 6px '+cols[Math.floor(Math.random()*cols.length)];
  p.appendChild(el);
}
</script>
</body>
</html>
